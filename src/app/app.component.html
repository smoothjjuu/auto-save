<div class="app-container">
  <!-- 1. AUTHENTICATION HEADER (Common to all pages) -->
  <header class="glass-header">
    <div class="logo" (click)="goToHome()" style="cursor: pointer;">
      AutoSave<span class="version-tag">Angular 18.1</span>
    </div>
    
    <div class="auth-controls">
      <div *ngIf="auth.isAuthenticated(); else guestView" class="user-profile animate-fade-in">
        <div class="avatar">{{ auth.userData()?.name?.[0] || 'U' }}</div>
        <div class="user-info">
          <span class="user-name">{{ auth.userData()?.name }}</span>
        </div>
        <button (click)="logout()" class="btn btn-outline">Logout</button>
      </div>
      <ng-template #guestView>
        <div class="user-select-bar animate-fade-in">
          <span>Login as:</span>
          <button (click)="loginAs(0)" class="btn btn-sm btn-outline">Demo</button>
          <button (click)="loginAs(1)" class="btn btn-sm btn-outline">Alice</button>
          <button (click)="loginAs(2)" class="btn btn-sm btn-outline">Bob</button>
        </div>
      </ng-template>
    </div>
  </header>

  <main class="content-area">
    <!-- RouterOutlet displays the List or Editor component -->
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <p>Built with Angular 18.1 & RxJS Debounce Pattern</p>
  </footer>
</div>
